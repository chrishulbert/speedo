<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Speedo</title>
</head>

<body>
  <div class="container">
    <h1 id="speed"></h1>
    <p id="subtitle">Loading...</p>
  </div>
</body>

<script>
document.addEventListener("DOMContentLoaded", myLoad)
function myLoad() {
  if ("geolocation" in navigator) {
    watch()
  } else {
    display(null, 'Your browser does not support Geolocation.')
  }
}
function watch() {
  const options = { enableHighAccuracy: true }
  navigator.geolocation.watchPosition(onPosition, onError, options)
}
function onPosition(position) {
  let speed = '?'
  if (position.coords.speed) { // Speed is in m/sec.
    speed = (position.coords.speed * 3600.0 / 1000.0).toFixed(1)
  }
  display(speed, 'km/h')
}
function onError(geolocationError) {
  if (geolocationError.message) {
    // display('123.4', 'km/h')
    display(null, geolocationError.message)
  } else if (geolocationError.code === 1) {
    display(null, 'Permission denied.')
  } else if (geolocationError.code === 2) {
    display(null, 'Position unavailable.')
  } else if (geolocationError.code === 3) {
    display(null, 'Timeout.')
  } else {
    display(null, 'Unknown error.')
  }
}
function display(speed, subtitle) {
  document.getElementById('speed').innerHTML = speed
  document.getElementById('subtitle').innerHTML = subtitle
}
</script>
